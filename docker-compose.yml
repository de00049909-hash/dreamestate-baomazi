version: '3.8'

services:
  # MySQL 資料庫服務
  db:
    image: mysql:8.0
    container_name: dreamestate-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dreamestate_db
      MYSQL_USER: dreamestate_user
      MYSQL_PASSWORD: dreamestate_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dreamestate-network

  # 應用服務
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamestate-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://dreamestate_user:dreamestate_password@db:3306/dreamestate_db
      OAUTH_SERVER_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dreamestate-network
    restart: unless-stopped

  # Nginx 反向代理（用於 HTTPS）
  nginx:
    image: nginx:alpine
    container_name: dreamestate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - dreamestate-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  dreamestate-network:
    driver: bridge
